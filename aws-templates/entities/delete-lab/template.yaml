apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  description: |
    🗑️ TEMPLATE PARA ELIMINAR LABORATORIOS (STACK COMPLETO)!!
    
    Este template permite eliminar completamente un stack de observabilidad
    y TODOS los componentes asociados (apps de estudiantes), incluyendo:
    1. Todas las aplicaciones de ArgoCD (stack + apps hijas)
    2. Todas las entidades y locations registradas en el catálogo de Backstage
    
    ⚠️ Esta acción es IRREVERSIBLE. Los recursos de Kubernetes serán eliminados
    permanentemente. Los repositorios de GitHub NO serán afectados.
    
  name: delete-lab
  title: 🗑️ Eliminar Stack de Laboratorio
  tags:
    - delete
    - cleanup
    - laboratory
    - management

spec:
  owner: teachers
  type: service
  
  parameters:
    # ========================================
    # Paso 1: Seleccionar el System (Stack)
    # ========================================
    - title: ⚠️ Seleccionar Stack a Eliminar
      description: |
        Selecciona el **System (Stack de Observabilidad)** que deseas eliminar.
        **ADVERTENCIA**: Esto eliminará el stack Y TODAS las aplicaciones de estudiantes asociadas.
      required:
        - systemRef
      properties:
        systemRef:
          title: Stack a Eliminar
          type: string
          description: Selecciona el System del catálogo que deseas eliminar junto con todos sus componentes
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: System
              spec.stackType: observability-stack
            allowArbitraryValues: false

    # ========================================
    # Paso 2: Confirmación
    # ========================================
    - title: 🔐 Confirmación de Eliminación
      description: |
        Por favor confirma que deseas eliminar este stack y TODOS sus componentes.
        Esta acción NO se puede deshacer.
      required:
        - confirmDelete
      properties:
        confirmDelete:
          type: string
          title: Escribe ELIMINAR para confirmar
          description: Escribe la palabra ELIMINAR (en mayúsculas) para confirmar la eliminación
          pattern: '^ELIMINAR$'

  # ========================================
  # PASOS DE EJECUCIÓN
  # ========================================
  steps:
    # --------------------------------------------------
    # FASE 1: Recopilar información del System y sus componentes
    # --------------------------------------------------

    # Paso 1: Obtener información del System
    - id: fetch-system
      name: Obtener Información del System
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.systemRef }}

    # Paso 2: Extraer el nombre del System
    - id: extract-system-name
      name: Extraer Nombre del System
      action: roadiehq:utils:jsonata
      input:
        data:
          entity: ${{ steps['fetch-system'].output.entity }}
        expression: >
          entity.metadata.name

    # Paso 3: Extraer UID del System
    - id: extract-system-uid
      name: Extraer UID del System
      action: roadiehq:utils:jsonata
      input:
        data:
          entity: ${{ steps['fetch-system'].output.entity }}
        expression: >
          entity.metadata.uid

    # Paso 4: Extraer ArgoCD app name del System
    - id: extract-system-argocd
      name: Extraer ArgoCD App del System
      action: roadiehq:utils:jsonata
      input:
        data:
          entity: ${{ steps['fetch-system'].output.entity }}
        expression: >
          entity.metadata.annotations.`argocd/app-name`
            ? entity.metadata.annotations.`argocd/app-name`
            : entity.metadata.name

    # Paso 5: Extraer location ref del System
    - id: extract-system-location-ref
      name: Extraer Location Ref del System
      action: roadiehq:utils:jsonata
      input:
        data:
          entity: ${{ steps['fetch-system'].output.entity }}
        expression: >
          entity.metadata.annotations.`backstage.io/managed-by-location`

    # Paso 6: Consultar todos los componentes que pertenecen a este System
    - id: fetch-child-components
      name: Buscar Componentes del System
      action: http:backstage:request
      input:
        method: GET
        path: /catalog/entities?filter=kind=component,spec.system=system:default/${{ steps['extract-system-name'].output.result }}
        logRequestPath: true
        continueOnBadResponse: true

    # Paso 7: Debug - ver qué retornó el query de componentes
    - id: log-components-raw
      name: Debug - Componentes Encontrados
      action: debug:log
      input:
        message: "Componentes encontrados (raw body): ${{ steps['fetch-child-components'].output.body }}"
        listWorkspace: false

    # Paso 8: Extraer argocd app names de los componentes hijos
    - id: extract-child-argocd-names
      name: Extraer ArgoCD App Names de Componentes
      action: roadiehq:utils:jsonata
      input:
        data:
          components: ${{ steps['fetch-child-components'].output.body }}
        expression: >
          $append([], components.metadata.annotations.`argocd/app-name`)

    # Paso 9: Debug - ver argocd names extraídos
    - id: log-argocd-names
      name: Debug - ArgoCD Names
      action: debug:log
      input:
        message: "ArgoCD app names: ${{ steps['extract-child-argocd-names'].output.result }}"
        listWorkspace: false

    # Paso 10: Extraer UIDs de los componentes hijos
    - id: extract-child-uids
      name: Extraer UIDs de Componentes
      action: roadiehq:utils:jsonata
      input:
        data:
          components: ${{ steps['fetch-child-components'].output.body }}
        expression: >
          $append([], components.metadata.uid)

    # Paso 11: Extraer location refs de los componentes hijos
    - id: extract-child-location-refs
      name: Extraer Location Refs de Componentes
      action: roadiehq:utils:jsonata
      input:
        data:
          components: ${{ steps['fetch-child-components'].output.body }}
        expression: >
          $append([], components.metadata.annotations.`backstage.io/managed-by-location`)

    # Paso 12: Obtener todas las Locations del catálogo
    - id: fetch-all-locations
      name: Obtener Locations del Catálogo
      action: http:backstage:request
      input:
        method: GET
        path: /catalog/locations
        logRequestPath: true
        continueOnBadResponse: true

    # Paso 13: Extraer Location IDs que coinciden con los componentes hijos
    - id: extract-child-location-ids
      name: Extraer Location IDs de Componentes
      action: roadiehq:utils:jsonata
      input:
        data:
          locationRefs: ${{ steps['extract-child-location-refs'].output.result }}
          locations: ${{ steps['fetch-all-locations'].output.body }}
        expression: |
          $append([],
            $map(locationRefs, function($ref) {
              $filter(locations, function($l) { $l.data.target = $substringAfter($ref, "url:") })[0].data.id
            })
          )

    # Paso 14: Extraer Location ID del System
    - id: extract-system-location-id
      name: Extraer Location ID del System
      action: roadiehq:utils:jsonata
      input:
        data:
          locationRef: ${{ steps['extract-system-location-ref'].output.result }}
          locations: ${{ steps['fetch-all-locations'].output.body }}
        expression: |
          $filter(locations, function($l) { $l.data.target = $substringAfter(locationRef, "url:") })[0].data.id

    # Paso 15: Log de información antes de eliminar
    - id: log-info
      name: Verificar Información de Eliminación
      action: debug:log
      input:
        message: |
          === ELIMINACIÓN DE STACK ===
          System: ${{ steps['extract-system-name'].output.result }}
          System UID: ${{ steps['extract-system-uid'].output.result }}
          System ArgoCD App: ${{ steps['extract-system-argocd'].output.result }}
          System Location ID: ${{ steps['extract-system-location-id'].output.result }}
          Child ArgoCD Apps: ${{ steps['extract-child-argocd-names'].output.result }}
          Child UIDs: ${{ steps['extract-child-uids'].output.result }}
          Child Location IDs: ${{ steps['extract-child-location-ids'].output.result }}
        listWorkspace: false

    # --------------------------------------------------
    # FASE 2: Eliminar aplicaciones de ArgoCD (componentes hijos)
    # --------------------------------------------------
    - id: delete-child-argocd-apps
      name: Eliminar Apps de ArgoCD (Componentes)
      each: ${{ steps['extract-child-argocd-names'].output.result }}
      action: http:backstage:request
      input:
        method: DELETE
        path: /argocd/argoInstance/in-cluster/applications/${{ each.value }}
        logRequestPath: true
        continueOnBadResponse: true

    # --------------------------------------------------
    # FASE 3: Eliminar la app de ArgoCD del System
    # --------------------------------------------------
    - id: delete-system-argocd-app
      name: Eliminar App de ArgoCD (System)
      action: http:backstage:request
      input:
        method: DELETE
        path: /argocd/argoInstance/in-cluster/applications/${{ steps['extract-system-argocd'].output.result }}
        logRequestPath: true
        continueOnBadResponse: true

    # --------------------------------------------------
    # FASE 4: Eliminar Locations de los componentes hijos
    # --------------------------------------------------
    - id: delete-child-locations
      name: Eliminar Locations (Componentes)
      each: ${{ steps['extract-child-location-ids'].output.result }}
      action: http:backstage:request
      input:
        method: DELETE
        path: /catalog/locations/${{ each.value }}
        logRequestPath: true
        continueOnBadResponse: true

    # --------------------------------------------------
    # FASE 5: Eliminar entidades de los componentes hijos
    # --------------------------------------------------
    - id: delete-child-entities
      name: Desregistrar Entidades (Componentes)
      each: ${{ steps['extract-child-uids'].output.result }}
      action: http:backstage:request
      input:
        method: DELETE
        path: /catalog/entities/by-uid/${{ each.value }}
        logRequestPath: true
        continueOnBadResponse: true

    # --------------------------------------------------
    # FASE 6: Eliminar Location del System
    # --------------------------------------------------
    - id: delete-system-location
      name: Eliminar Location (System)
      action: http:backstage:request
      input:
        method: DELETE
        path: /catalog/locations/${{ steps['extract-system-location-id'].output.result }}
        logRequestPath: true
        continueOnBadResponse: true

    # --------------------------------------------------
    # FASE 7: Eliminar entidad del System
    # --------------------------------------------------
    - id: delete-system-entity
      name: Desregistrar Entidad (System)
      action: http:backstage:request
      input:
        method: DELETE
        path: /catalog/entities/by-uid/${{ steps['extract-system-uid'].output.result }}
        logRequestPath: true
        continueOnBadResponse: true

    # Paso final: Log de resultados
    - id: log-final
      name: Verificar Resultados Finales
      action: debug:log
      input:
        message: |
          === RESULTADOS DE ELIMINACIÓN ===
          System ArgoCD Delete: ${{ steps['delete-system-argocd-app'].output.code }}
          System Location Delete: ${{ steps['delete-system-location'].output.code }}
          System Entity Delete: ${{ steps['delete-system-entity'].output.code }}
        listWorkspace: false

  # ========================================
  # SALIDA
  # ========================================
  output:
    text:
      - title: 🗑️ Stack de Laboratorio Eliminado
        content: |
          El stack **${{ steps['extract-system-name'].output.result }}** y todos sus componentes han sido procesados para eliminación.
          
          **Resultados del System:**
          - ArgoCD: Status ${{ steps['delete-system-argocd-app'].output.code }}
          - Location: Status ${{ steps['delete-system-location'].output.code }}
          - Entity: Status ${{ steps['delete-system-entity'].output.code }}
          
          **Nota:** Los recursos de Kubernetes pueden tardar unos minutos en eliminarse completamente.
          Los repositorios de GitHub NO fueron modificados.
