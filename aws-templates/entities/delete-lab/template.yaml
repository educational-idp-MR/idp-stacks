apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  description: |
    🗑️ TEMPLATE PARA ELIMINAR LABORATORIOS!!
    
    Este template permite eliminar completamente un laboratorio desplegado,
    incluyendo:
    1. La aplicación de ArgoCD (y todos los recursos de Kubernetes asociados)
    2. La entidad registrada en el catálogo de Backstage
    
    ⚠️ Esta acción es IRREVERSIBLE. Los recursos de Kubernetes serán eliminados
    permanentemente. El repositorio de GitHub NO será afectado.
    
  name: delete-lab
  title: 🗑️ Eliminar Laboratorio
  tags:
    - delete
    - cleanup
    - laboratory
    - management

spec:
  owner: teachers
  type: service
  
  parameters:
    # ========================================
    # Paso 1: Seleccionar el Componente
    # ========================================
    - title: ⚠️ Seleccionar Laboratorio a Eliminar
      description: |
        Selecciona el componente que deseas eliminar del catálogo y de ArgoCD.
        **ADVERTENCIA**: Esta acción eliminará permanentemente los recursos de Kubernetes.
      required:
        - componentRef
      properties:
        componentRef:
          title: Componente a Eliminar
          type: string
          description: Selecciona el componente del catálogo que deseas eliminar
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Component
            allowArbitraryValues: false

    # ========================================
    # Paso 2: Confirmación
    # ========================================
    - title: 🔐 Confirmación de Eliminación
      description: |
        Por favor confirma que deseas eliminar este laboratorio.
        Esta acción NO se puede deshacer.
      required:
        - confirmDelete
      properties:
        confirmDelete:
          type: string
          title: Escribe ELIMINAR para confirmar
          description: Escribe la palabra ELIMINAR (en mayúsculas) para confirmar la eliminación
          pattern: '^ELIMINAR$'

  # ========================================
  # PASOS DE EJECUCIÓN
  # ========================================
  steps:
    # Paso 1: Obtener información de la entidad del catálogo
    - id: fetch-entity
      name: Obtener Información del Componente
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.componentRef }}

    # Paso 2: Extraer el nombre de la app de ArgoCD desde las annotations
    - id: extract-argocd-app-name
      name: Extraer Nombre de App en ArgoCD
      action: roadiehq:utils:jsonata
      input:
        data:
          entity: ${{ steps['fetch-entity'].output.entity }}
        expression: >
          entity.metadata.annotations.`argocd/app-name`
            ? entity.metadata.annotations.`argocd/app-name`
            : entity.metadata.name

    # Paso 3: Extraer el UID de la entidad para desregistrarla
    - id: extract-entity-uid
      name: Extraer UID de la Entidad
      action: roadiehq:utils:jsonata
      input:
        data:
          entity: ${{ steps['fetch-entity'].output.entity }}
        expression: >
          entity.metadata.uid

    # Paso 4: Extraer la Location que gestiona esta entidad
    - id: extract-location-ref
      name: Extraer Location de Origen
      action: roadiehq:utils:jsonata
      input:
        data:
          entity: ${{ steps['fetch-entity'].output.entity }}
        expression: >
          entity.metadata.annotations.`backstage.io/managed-by-location`

    # Paso 5: Log de información antes de eliminar
    - id: log-info
      name: Verificar Información de Eliminación
      action: debug:log
      input:
        message: |
          Procediendo a eliminar:
          - ArgoCD App: ${{ steps['extract-argocd-app-name'].output.result }}
          - Backstage Entity UID: ${{ steps['extract-entity-uid'].output.result }}
          - Managed by Location: ${{ steps['extract-location-ref'].output.result }}
          - Component Ref: ${{ parameters.componentRef }}
        listWorkspace: false

    # Paso 5: Eliminar la aplicación de ArgoCD
    # Esto también elimina todos los recursos de Kubernetes gestionados (cascade)
    - id: delete-argocd-app
      name: Eliminar Aplicación de ArgoCD
      action: http:backstage:request
      input:
        method: DELETE
        path: /argocd/argoInstance/in-cluster/applications/${{ steps['extract-argocd-app-name'].output.result }}
        logRequestPath: true
        continueOnBadResponse: true

    # Paso 6: Log del resultado de eliminación de ArgoCD
    - id: log-argocd-result
      name: Verificar Resultado de ArgoCD
      action: debug:log
      input:
        message: |
          Resultado de eliminación en ArgoCD:
          - Status Code: ${{ steps['delete-argocd-app'].output.code }}
          - Body: ${{ steps['delete-argocd-app'].output.body }}
        listWorkspace: false

    # Paso 7: Buscar la Location en el catálogo para obtener su ID
    - id: find-location
      name: Buscar Location en el Catálogo
      action: http:backstage:request
      input:
        method: GET
        path: /catalog/locations
        logRequestPath: true
        continueOnBadResponse: true

    # Paso 8: Extraer el ID de la Location que coincide con esta entidad
    - id: extract-location-id
      name: Extraer ID de la Location
      action: roadiehq:utils:jsonata
      input:
        data:
          locations: ${{ steps['find-location'].output.body }}
          locationRef: ${{ steps['extract-location-ref'].output.result }}
        expression: >
          (
            $target := $substringAfter(locationRef, "url:");
            $match := $filter(locations, function($loc) {
              $loc.data.target = $target
            });
            $count($match) > 0 ? $match[0].data.id : null
          )

    # Paso 9: Log de la Location encontrada
    - id: log-location
      name: Verificar Location Encontrada
      action: debug:log
      input:
        message: |
          Location encontrada:
          - Location Ref: ${{ steps['extract-location-ref'].output.result }}
          - Location ID: ${{ steps['extract-location-id'].output.result }}
        listWorkspace: false

    # Paso 10: Eliminar la Location del catálogo (esto evita que Backstage re-descubra la entidad)
    - id: delete-location
      name: Eliminar Location del Catálogo
      action: http:backstage:request
      input:
        method: DELETE
        path: /catalog/locations/${{ steps['extract-location-id'].output.result }}
        logRequestPath: true
        continueOnBadResponse: true

    # Paso 11: Desregistrar la entidad del catálogo de Backstage
    - id: unregister-entity
      name: Desregistrar Entidad del Catálogo
      action: http:backstage:request
      input:
        method: DELETE
        path: /catalog/entities/by-uid/${{ steps['extract-entity-uid'].output.result }}
        logRequestPath: true
        continueOnBadResponse: true

    # Paso 12: Log del resultado de desregistro
    - id: log-unregister-result
      name: Verificar Resultado de Desregistro
      action: debug:log
      input:
        message: |
          Resultado de desregistro en Backstage:
          - Location Delete Status: ${{ steps['delete-location'].output.code }}
          - Entity Delete Status: ${{ steps['unregister-entity'].output.code }}
        listWorkspace: false

  # ========================================
  # SALIDA
  # ========================================
  output:
    text:
      - title: 🗑️ Laboratorio Eliminado
        content: |
          El laboratorio **${{ steps['extract-argocd-app-name'].output.result }}** ha sido procesado para eliminación.
          
          **Resultados:**
          - ArgoCD: Status ${{ steps['delete-argocd-app'].output.code }}
          - Location: Status ${{ steps['delete-location'].output.code }}
          - Entity: Status ${{ steps['unregister-entity'].output.code }}
          
          **Nota:** Los recursos de Kubernetes pueden tardar unos minutos en eliminarse completamente.
          El repositorio de GitHub NO fue modificado.
